<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Culture</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="top-buttons">

    <button onclick="history.back()" class="back-btn">
        ← Back
    </button>

    <a href="uiux.html" class="home-btn">
        Home
    </a>

</div>
  <nav>
    <h1 id="culture">Culture</h1>
<div class="lang-buttons">
<button onclick="changeLanguage('eng')">ENG</button>
<button onclick="changeLanguage('jpn')">日本語</button>
</div>
  </nav>

  <section class="cards">


    <div class="card">
      <img src="15.jpeg"
style="
object-position:top;
">
      <h3 id="thanaka">Thanaka</h3>
    </div>
    <div class="card">
      <img src="chinlone2.jpg">
      <h3 id="chinlone">Chinlone</h3>
    </div>
    <div class="card">
      <img src="16.jpeg">
      <h3 id="performance"> Traditional Performances</h3>
    </div>
    <div class="card">
      <img src="18.jpeg">
      <h3 id="bmca">Burmese monks collecting alms</h3>
    </div>
  </section>
<script>

const languageData = {
eng: {
culture: "Culture",
thanaka: "Thanaka",
chinlone: "Chinlone",
performance: "Traditional Performances",
bmca: "Burmese monks collecting alms"
},
jpn: {
culture: "文化",
thanaka: "タナカ",
chinlone: "チンロン",
performance: "伝統的なパフォーマンス",
bmca: "ミャンマー僧侶の托鉢"
}
};
function changeLanguage(language) {
      document.getElementById("culture").innerText = languageData[language].culture;
      document.getElementById("thanaka").innerText = languageData[language].thanaka;
      document.getElementById("chinlone").innerText = languageData[language].chinlone;
      document.getElementById("performance").innerText = languageData[language].performance;
      document.getElementById("bmca").innerText = languageData[language].bmca;
    }
  </script>
</body>
</html>
